name: Daily Tech Blog Automation

on:
  schedule:
    # Runs at 12:00 AM UTC (approx midnight IST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual triggering from GitHub UI

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important for pushing back to repo
    steps:
      - name: 🛡️ Checkout Repository
        uses: actions/checkout@v4
        with:
          # Fetch all history so rebase works correctly
          fetch-depth: 0

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install --legacy-peer-deps

      - name: 🤖 Generate Blog Post via Gemini AI
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/generateBlog.js

      - name: 🚀 Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add all changes (including package-lock.json if updated)
          git add .
          
          # Only proceed if there are actual changes to commit
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore(blog): auto-post & update lockfile [skip ci]"
            
            # Pull latest changes from remote to avoid conflicts, then push
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected."
          fi
